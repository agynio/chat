name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install buf
        run: |
          curl -sSL https://github.com/bufbuild/buf/releases/download/v1.64.0/buf-Linux-x86_64.tar.gz \
            | sudo tar -xzf - -C /usr/local --strip-components=1 buf/bin/buf

      - name: Generate protobuf bindings
        run: |
          buf generate buf.build/agynio/api --path agynio/api/chat/v1 --path agynio/api/threads/v1

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...
