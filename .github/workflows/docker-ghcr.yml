name: Build and publish chat image

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/agynio/chat

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=chat
          cache-to: type=gha,scope=chat,mode=max
          build-args: GO_VERSION=1.24

      - name: Verify multi-arch manifest
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          INSPECT="$(docker buildx imagetools inspect "$IMAGE_NAME:$TAG" --raw)"
          for ARCH in amd64 arm64; do
            if ! echo "$INSPECT" | grep -q "\"architecture\":\"$ARCH\"\|\"architecture\": \"$ARCH\""; then
              echo "::error::linux/$ARCH missing from manifest $IMAGE_NAME:$TAG"
              exit 1
            fi
          done
          echo "Manifest $IMAGE_NAME:$TAG includes linux/amd64 and linux/arm64"
