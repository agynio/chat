name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - uses: docker/setup-buildx-action@v3

      - name: Install buf
        run: |
          curl -sSL https://github.com/bufbuild/buf/releases/download/v1.64.0/buf-Linux-x86_64.tar.gz \
            | sudo tar -xzf - -C /usr/local --strip-components=1 buf/bin/buf

      - name: Set release versions
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME}"
          CHART_VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"
          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_ENV"

      - name: Generate protobufs
        run: make proto

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: go build ./...

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/agynio/chat:${{ env.RELEASE_VERSION }}
            ghcr.io/agynio/chat:latest
            ghcr.io/agynio/chat:${{ github.sha }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          helm package charts/chat --version "${CHART_VERSION}" --app-version "${CHART_VERSION}"

      - name: Push Helm chart to GHCR
        env:
          CHART_VERSION: ${{ env.CHART_VERSION }}
        run: |
          helm registry login ghcr.io --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}
          helm push chat-${CHART_VERSION}.tgz oci://ghcr.io/agynio/charts
